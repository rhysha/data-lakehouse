version: "3.9"

networks:
  lakehouse:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  superset_home:

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lakeuser
      POSTGRES_PASSWORD: lakepass
      POSTGRES_DB: lakedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=5
        -c max_wal_senders=5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakeuser -d lakedb"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ─── Zookeeper ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    networks: [lakehouse]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | bash -c 'cat > /dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 15s

  # ─── Kafka ────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx1g -Xms512m"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ─── Kafka Connect (Debezium) ──────────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka-connect
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      HEAP_OPTS: "-Xmx1g -Xms512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 minioadmin minioadmin123 && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ─── MinIO bucket init ────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks: [lakehouse]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing myminio/lakehouse &&
        echo 'Bucket lakehouse ready'
      "

  # ─── Iceberg REST Catalog ─────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:0.10.0
    container_name: iceberg-rest
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8181:8181"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      CATALOG_WAREHOUSE: s3://lakehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3__ENDPOINT: http://minio:9000
      CATALOG_S3__PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8181'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # ─── Flink JobManager ─────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: flink-jobmanager
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8082:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1g
        taskmanager.memory.process.size: 2g
        parallelism.default: 1
        state.backend: filesystem
        state.checkpoints.dir: s3://lakehouse/flink-checkpoints/
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin123
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─── Flink TaskManager ────────────────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: flink-taskmanager
    restart: unless-stopped
    networks: [lakehouse]
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2g
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: s3://lakehouse/flink-checkpoints/
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin123

  # ─── Trino ────────────────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:438
    container_name: trino
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8080:8080"
    depends_on:
      iceberg-rest:
        condition: service_healthy
    volumes:
      - ./trino/config.properties:/etc/trino/config.properties
      - ./trino/catalog:/etc/trino/catalog
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─── ClickHouse ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8123:8123"
      - "19000:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ─── Superset ─────────────────────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: superset
    restart: unless-stopped
    networks: [lakehouse]
    ports:
      - "8088:8088"
    depends_on:
      trino:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: "lakehouse-poc-secret-key-change-in-production"
      ADMIN_PASSWORD: admin
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - superset_home:/app/superset_home
    entrypoint: >
      /bin/sh -c "
        pip install --quiet trino clickhouse-connect &&
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@lakehouse.local
          --password admin || true &&
        superset init &&
        gunicorn
          --bind 0.0.0.0:8088
          --workers 2
          --timeout 120
          --limit-request-line 0
          --limit-request-field_size 0
          'superset.app:create_app()'
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
